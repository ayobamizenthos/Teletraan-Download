<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" preserveAspectRatio="xMidYMid meet">
        <defs>
            <!-- ========================================== -->
            <!-- PREMIUM 3D METALLIC STONE GRADIENTS        -->
            <!-- Formulated visually for specular behavior  -->
            <!-- ========================================== -->

            <!-- T-HEAD GRADIENTS -->
            <!-- Left side of T-Head top catches immense glare from light source -->
            <linearGradient id="thead-top" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#E4E9EF" />
                <stop offset="30%" stop-color="#CED5DC" />
                <stop offset="65%" stop-color="#8E97A2" />
                <stop offset="100%" stop-color="#5B636C" />
            </linearGradient>

            <!-- Diagonal striking glare on the T-Head Front Face -->
            <linearGradient id="thead-front" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#E4E9EF" />
                <stop offset="25%" stop-color="#C5CFDB" />
                <stop offset="65%" stop-color="#7B8591" />
                <stop offset="100%" stop-color="#343B43" />
            </linearGradient>

            <!-- Side illuminated and shadowed faces -->
            <linearGradient id="thead-left" x1="100%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#A9B3BD" />
                <stop offset="100%" stop-color="#6F7984" />
            </linearGradient>
            <linearGradient id="thead-right" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#24282D" />
                <stop offset="100%" stop-color="#0E1013" />
            </linearGradient>

            <!-- ========================================== -->
            <!-- LEFT STONE GRADIENTS                       -->
            <!-- ========================================== -->
            <!-- Main Front Face (Recessed below T-Head) -->
            <linearGradient id="lstone-main" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#9099A5" />
                <stop offset="100%" stop-color="#464D56" />
            </linearGradient>
            <!-- Inner Bevel (Deep ambient shadow diving inward) -->
            <linearGradient id="lstone-inner" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#3A414A" />
                <stop offset="100%" stop-color="#1D2228" />
            </linearGradient>

            <!-- ========================================== -->
            <!-- RIGHT STONE (HERO) GRADIENTS               -->
            <!-- ========================================== -->
            <!-- Left Hero Bevel (Extreme direct specular highlight) -->
            <linearGradient id="rstone-hero" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFFFFF" />
                <stop offset="100%" stop-color="#AEB7C2" />
            </linearGradient>
            <!-- Main Overlapping Face -->
            <linearGradient id="rstone-main" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#97A1AC" />
                <stop offset="100%" stop-color="#3B4149" />
            </linearGradient>

            <!-- Inner Deep Shadow Bevel (Behind the bright hero bevel) -->
            <linearGradient id="rstone-inner" x1="100%" y1="0%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#21262D" />
                <stop offset="100%" stop-color="#07080B" />
            </linearGradient>

            <!-- ========================================== -->
            <!-- STROKE GRADIENTS (PREMIUM TAPERED ALIASING) -->
            <!-- ========================================== -->

            <!-- Horizontal center fade for the main Top Lip -->
            <linearGradient id="glare-horizontal-center" gradientUnits="userSpaceOnUse" x1="332" y1="0" x2="692" y2="0">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.0" />
                <stop offset="35%" stop-color="#FFFFFF" stop-opacity="1.0" />
                <stop offset="65%" stop-color="#FFFFFF" stop-opacity="1.0" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
            </linearGradient>

            <!-- Vertical fade for outer slants (bright top, fade out bottom) -->
            <linearGradient id="glare-vertical-fade-down" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1.0" />
                <stop offset="80%" stop-color="#FFFFFF" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
            </linearGradient>

            <!-- Vertical fade for inner pillars (fade top & bottom, bright middle) -->
            <linearGradient id="glare-vertical-center" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.0" />
                <stop offset="25%" stop-color="#FFFFFF" stop-opacity="1.0" />
                <stop offset="75%" stop-color="#FFFFFF" stop-opacity="1.0" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
            </linearGradient>

            <!-- Chamfer flares (bright top, fade to bottom point) -->
            <linearGradient id="glare-chamfer-fade" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2" />
            </linearGradient>

            <!-- Horizontal bottom lip fade (bright at center gap, fading out to edges) -->
            <linearGradient id="glare-horizontal-outward" gradientUnits="userSpaceOnUse" x1="490" y1="0" x2="442"
                y2="0">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
            </linearGradient>
            <linearGradient id="glare-horizontal-outward-right" gradientUnits="userSpaceOnUse" x1="545" y1="0" x2="608"
                y2="0">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
            </linearGradient>

            <!-- Soft drop shadow for overlapping 3D elements (creating depth where right leg overlaps T-head) -->
            <filter id="overlap-shadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="-5" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.55" />
            </filter>


        </defs>

        <g transform="translate(0, -10)">

            <!-- ============================================================== -->
            <!-- 1. LEFT STONE (DETACHED BASE)                                  -->
            <!-- Formed without the leftmost flat bevel as requested            -->
            <!-- Gap is strictly EMPTY transparent white connecting above it.   -->
            <!-- ============================================================== -->
            <!-- Center Main Face -->
            <!-- Adjusted inner X-coord so it forms an exactly 48-pixel width (536-488=48 vs 483-435=48) -->
            <polygon points="442,415 490,415 490,681 442,681" fill="url(#lstone-main)" />

            <!-- Deep Inner Fold forming the shaded inner side of the Left Stone -->
            <!-- Top slants downwards towards the center gap matching the reference angle -->
            <polygon points="490,415 512,428 512,681 490,681" fill="url(#lstone-inner)" />

            <!-- Left Spike Chamfers (Mathematically converging to bottom center point) -->
            <!-- Converging strictly to bottom tip: (512, 750) -->
            <polygon points="442,681 490,681 512,750" fill="#404750" />
            <polygon points="490,681 512,681 512,750" fill="#1D2228" />


            <!-- ============================================================== -->
            <!-- 2. TOP HORIZONTAL BAR (T-HEAD)                                 -->
            <!-- Drawn over the empty gap to provide natural overhang           -->
            <!-- ============================================================== -->
            <!-- Top Face -->
            <polygon points="260,260 764,260 692,340 332,340" fill="url(#thead-top)" />

            <!-- Side Planks -->
            <!-- Left Side -->
            <polygon points="260,260 332,340 332,395 260,315" fill="url(#thead-left)" />
            <!-- Right Side -->
            <polygon points="764,260 692,340 692,395 764,315" fill="url(#thead-right)" />

            <!-- Main Front Face -->
            <polygon points="332,340 692,340 692,395 332,395" fill="url(#thead-front)" />


            <!-- ============================================================== -->
            <!-- 3. OVERLAPPING RIGHT STONE (PARTIAL OVERLAP)                   -->
            <!-- Capturing the specific asymmetrical overlap where only the     -->
            <!-- bright inner bevel reaches the top of the T-head, and the      -->
            <!-- main solid face slants downward precisely to the bottom of it. -->
            <!-- ============================================================== -->

            <!-- The rstone-inner shadow fold is unnecessary since lstone-inner directly reaches X=512 from Y=350 to Y=680 -->

            <g filter="url(#overlap-shadow)">
                <!-- Hero Left Bevel -->
                <!-- Forms the upward-slanting left side of the peak, overlapping the T-head -->
                <!-- Ascends exactly from the vertical center seam at X=512 -->
                <polygon points="512,385 545,365 545,681 512,681" fill="url(#rstone-hero)" />

                <!-- Main Solid Front Face -->
                <!-- Forms the downward-slanting right side of the peak -->
                <polygon points="545,365 608,432 608,681 545,681" fill="url(#rstone-main)" />

                <!-- Right Spike Chamfers (Symmetrical matching the Left spike) -->
                <!-- Same bottom point convergence: (512, 750) -->
                <polygon points="512,681 545,681 512,750" fill="#B0B9C4" />
                <polygon points="545,681 608,681 512,750" fill="#2E3339" />
            </g>


            <!-- ============================================================== -->
            <!-- 4. WHITE SPECULAR RIDGE HIGHLIGHTS                             -->
            <!-- STRICTLY APPLIED ONLY TO GLARING EDGES, NOT ENTIRE BORDERS     -->
            <!-- Simulates photorealistic stone-light specular reflections      -->
            <!-- ============================================================== -->

            <!-- A. Top Bar Ridge -->
            <!-- Highlight removed to match clean original design -->

            <!-- Upper Lip Front Edge catching main glare (brightest on the left, fading towards the darker side) -->
            <!-- Physically tapers to 0 at the tips and flares in the center using dual bezier curve to create a stylish lens flare wedge -->
            <path d="M 332,340 Q 512,336.5 692,340 Q 512,343.5 332,340 Z" fill="url(#glare-horizontal-center)" />

            <!-- Sharp Left Side upper vertical glare -->
            <path d="M 260,260 L 264,260 Q 298,300 332,340 Z" fill="url(#glare-vertical-fade-down)" />

            <!-- Sharp Right Side upper vertical glare -->
            <path d="M 764,260 L 760,260 Q 726,300 692,340 Z" fill="url(#glare-vertical-fade-down)" />

            <!-- Left front lateral edge glare -->
            <path d="M 332,340 L 336,340 L 332,395 Z" fill="url(#glare-vertical-fade-down)" />

            <!-- Right front lateral edge glare -->
            <path d="M 692,340 L 688,340 L 692,395 Z" fill="url(#glare-vertical-fade-down)" />


            <!-- B. Left Stone Edges -->
            <!-- Top edge highlight removed for a fully smooth premium blend -->

            <!-- Outer-most boundary highlighting the shape breaking the void -->
            <!-- Highlight removed to match clean original design -->

            <!-- Thick inner vertical boundary line defining the edge of the gap -->
            <!-- Physically tapers using an ultra-smooth quadratic bezier curve for extreme premium look -->
            <path d="M 490,415 Q 483,547.5 490,680 Z" fill="url(#glare-vertical-center)" />

            <!-- Horizontal bottom lip glare (left leg) sleek tapered curve -->
            <path d="M 490,681 L 490,676 Q 460,677 442,681 Z" fill="url(#glare-horizontal-outward)" />

            <!-- Left side of the inner V chamfer, tapered to sharp point at the bottom tip -->
            <path d="M 490,680 L 493,680 L 512,750 Z" fill="url(#glare-chamfer-fade)" />


            <!-- C. Right Stone Hero Edges -->
            <!-- Intense white flare splitting vertically exactly between the left gap and the right arm -->
            <!-- Highlight removed to match clean original design -->

            <!-- The diagonal top border perfectly scoring the gap below the T-Head -->
            <!-- Highlight removed for realistic blending -->

            <!-- Intense vertical seam between the bright Left Bevel and Main face of Right Stone -->
            <!-- Physically tapers using an ultra-smooth quadratic bezier curve for extreme premium look -->
            <path d="M 545,365 Q 552,522.5 545,680 Z" fill="url(#glare-vertical-center)" />

            <!-- Horizontal bottom lip glare (right leg) sleek tapered curve -->
            <path d="M 545,681 L 545,676 Q 575,677 608,681 Z" fill="url(#glare-horizontal-outward-right)" />

            <!-- Right side of the inner V chamfer, tapered to sharp point at the bottom tip -->
            <path d="M 545,680 L 542,680 L 512,750 Z" fill="url(#glare-chamfer-fade)" />

        </g>
    </svg>